<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PrintForge - Atölye</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
    <style>
        body { background: #04080a; color: white; font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .card { background: #060c10; padding: 30px; border-radius: 15px; border: 1px solid #0e2028; width: 100%; max-width: 500px; text-align: center; }
        button { background: #00e5ff; color: black; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #0a1018; border: 1px solid #0e2028; color: white; border-radius: 5px; }
        #status { margin-top: 20px; color: #00ff9d; }
    </style>
</head>
<body>
    <h1>PrintForge Atölye</h1>
    <div class="card" id="authBox">
        <h3>Giriş Yap</h3>
        <input type="email" id="email" placeholder="E-posta">
        <input type="password" id="pass" placeholder="Şifre">
        <button onclick="login()">Giriş Yap</button>
        <button style="background:none; color:#00e5ff" onclick="register()">Hesap Oluştur</button>
    </div>

    <div class="card" id="genBox" style="display:none">
        <h3 id="welcome">Atölyeye Hoş Geldin!</h3>
        <textarea id="prompt" placeholder="Ne üretmek istersin?"></textarea>
        <button onclick="generate()">3D Model Üret</button>
        <div id="status"></div>
        <div id="result" style="height:300px; margin-top:20px; display:none"></div>
    </div>

    <script>
        const API = window.location.origin;
        let token = localStorage.getItem('pf_token');

        if(token) showApp();

        async function login() {
            const r = await fetch(API+'/api/auth/login', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({email: document.getElementById('email').value, password: document.getElementById('pass').value})
            });
            if(r.ok) {
                const d = await r.json();
                localStorage.setItem('pf_token', d.token);
                token = d.token;
                showApp();
            } else { alert("Giriş Başarısız!"); }
        }

        async function register() {
            const r = await fetch(API+'/api/auth/register', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({name: "Maker", email: document.getElementById('email').value, password: document.getElementById('pass').value})
            });
            if(r.ok) alert("Kayıt başarılı, şimdi giriş yap!");
        }

        function showApp() {
            document.getElementById('authBox').style.display = 'none';
            document.getElementById('genBox').style.display = 'block';
        }

        async function generate() {
            const st = document.getElementById('status');
            st.textContent = "⚙️ Üretiliyor...";
            const r = await fetch(API+'/api/generate/text', {
                method:'POST',
                headers:{'Content-Type':'application/json', 'Authorization': 'Bearer '+token},
                body: JSON.stringify({prompt: document.getElementById('prompt').value})
            });
            const d = await r.json();
            
            let poll = setInterval(async () => {
                const res = await fetch(API+'/api/status/'+d.task_id);
                const statusData = await res.json();
                if(statusData.status === 'done') {
                    clearInterval(poll);
                    st.textContent = "✅ Hazır!";
                    const resDiv = document.getElementById('result');
                    resDiv.style.display = 'block';
                    resDiv.innerHTML = `<model-viewer src="${API}/api/model/${d.task_id}/view" auto-rotate camera-controls style="width:100%; height:100%"></model-viewer>`;
                }
            }, 3000);
        }
    </script>
</body>
</html>
