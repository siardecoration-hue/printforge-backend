<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PrintForge - Atölye</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
    <style>
        body { background: #04080a; color: white; font-family: 'Outfit', sans-serif; margin: 0; padding: 20px; }
        .nav { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #0e2028; margin-bottom: 30px; }
        .card { background: #060c10; padding: 25px; border-radius: 15px; border: 1px solid #0e2028; margin-bottom: 20px; }
        button { background: #00e5ff; color: black; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        textarea { width: 100%; padding: 15px; background: #0a1018; border: 1px solid #0e2028; color: white; border-radius: 8px; margin: 10px 0; }
        .viewer { height: 400px; background: #000; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="nav">
        <div style="font-weight:bold; color:#00e5ff">PRINTFORGE ATÖLYE</div>
        <a href="/" style="color:white; text-decoration:none">← Ana Sayfaya Dön</a>
    </div>

    <div class="card">
        <h2>Yeni Bir Model Hayal Et</h2>
        <textarea id="prompt" placeholder="Örn: Cyberpunk bir kask, antik bir vazo..."></textarea>
        <button onclick="generate()">AI İle Üret</button>
        <div id="status" style="margin-top:15px; color:#00ff9d"></div>
        <div id="result" class="viewer" style="display:none"></div>
    </div>

    <script>
        const API = window.location.origin;
        const token = localStorage.getItem('pf_token');

        if(!token) window.location.href = '/';

        async function generate() {
            const btn = document.querySelector('button');
            const st = document.getElementById('status');
            btn.disabled = true;
            st.textContent = "🚀 Yapay zeka modeli örüyor, lütfen bekleyin...";

            const r = await fetch(API+'/api/generate/text', {
                method:'POST',
                headers:{'Content-Type':'application/json', 'Authorization': 'Bearer '+token},
                body: JSON.stringify({prompt: document.getElementById('prompt').value})
            });
            const d = await r.json();
            
            let poll = setInterval(async () => {
                const res = await fetch(API+'/api/status/'+d.task_id);
                const data = await res.json();
                if(data.status === 'done') {
                    clearInterval(poll);
                    st.textContent = "✅ Başarıyla Üretildi!";
                    const resDiv = document.getElementById('result');
                    resDiv.style.display = 'block';
                    resDiv.innerHTML = `<model-viewer src="${API}/api/model/${d.task_id}/view" auto-rotate camera-controls style="width:100%; height:100%"></model-viewer>`;
                    btn.disabled = false;
                }
            }, 5000);
        }
    </script>
</body>
</html>
