<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrintForge - Atölye</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
    <style>
        :root { --bg: #04080a; --card: #060c10; --accent: #00e5ff; --accent2: #00ff9d; --text: #c8dde5; --muted: #2a4a5a; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; color: white; }
        
        .nav { display: flex; justify-content: space-between; padding: 20px 40px; border-bottom: 1px solid #0e2028; background: rgba(4,8,10,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        
        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid #0e2028; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; color: var(--muted); padding: 10px 20px; cursor: pointer; font-family: 'Outfit'; font-size: 16px; transition: 0.3s; }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .card { background: var(--card); border: 1px solid #0e2028; border-radius: 20px; padding: 30px; margin-bottom: 20px; }
        
        textarea { width: 100%; padding: 15px; background: #0a1018; border: 1px solid #0e2028; color: white; border-radius: 10px; margin: 10px 0; font-family: inherit; resize: vertical; }
        
        /* Upload Area */
        .upload-area { border: 2px dashed var(--muted); border-radius: 15px; padding: 40px; text-align: center; cursor: pointer; transition: 0.3s; }
        .upload-area:hover { border-color: var(--accent); background: rgba(0,229,255,0.05); }
        .preview-img { max-width: 100%; max-height: 200px; border-radius: 10px; display: none; margin-top: 15px; }

        button { background: var(--accent); color: black; border: none; padding: 14px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; font-family: 'Outfit'; width: 100%; font-size: 16px; margin-top: 10px; }
        button:hover { background: var(--accent2); }
        button:disabled { background: var(--muted); cursor: not-allowed; }

        .status-box { margin-top: 20px; padding: 15px; border-radius: 10px; text-align: center; display: none; background: rgba(0,229,255,0.1); color: var(--accent); }
        .viewer-box { height: 450px; background: #000; border-radius: 20px; border: 1px solid #0e2028; margin-top: 30px; display: none; }
        
        .dl-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-s { background: #1a1a2e; color: white; border: 1px solid #0e2028; }
    </style>
</head>
<body>

    <div class="nav">
        <div style="font-weight: 800; color: var(--accent); font-family: 'Outfit'; font-size: 20px;">PRINTFORGE ATÖLYE</div>
        <a href="/" style="color:white; text-decoration:none; font-size: 14px;">← Ana Sayfaya Dön</a>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('text')">⌨️ Metinden 3D</button>
            <button class="tab-btn" onclick="switchTab('image')">🖼️ Görselden 3D</button>
        </div>

        <!-- Metin Paneli -->
        <div id="textPanel" class="card">
            <h3>Hayalindekini Yaz</h3>
            <textarea id="prompt" rows="4" placeholder="Örn: Astronaut sitting on a moon, realistic, high detail..."></textarea>
            <button id="genTextBtn" onclick="generate('text')">AI İle Üret</button>
        </div>

        <!-- Görsel Paneli -->
        <div id="imagePanel" class="card" style="display:none">
            <h3>Görselini Yükle</h3>
            <div class="upload-area" onclick="document.getElementById('fileInp').click()">
                <div id="uploadPlaceholder">
                    <p style="font-size: 40px; margin: 0;">📤</p>
                    <p>Tıkla veya görseli buraya sürükle</p>
                </div>
                <img id="imgPreview" class="preview-img">
                <input type="file" id="fileInp" hidden accept="image/*" onchange="previewFile()">
            </div>
            <button id="genImgBtn" onclick="generate('image')">Görseli 3D'ye Dönüştür</button>
        </div>

        <!-- Durum ve Sonuç -->
        <div id="status" class="status-box"></div>
        
        <div id="resultBox" class="viewer-box">
            <model-viewer id="modelViewer" auto-rotate camera-controls style="width:100%; height:100%;"></model-viewer>
        </div>

        <div id="downloadBox" class="dl-btns" style="display:none">
            <button class="btn-s" onclick="downloadModel('glb')">⬇️ GLB İndir</button>
            <button class="btn-s" onclick="alert('STL dönüştürme hazırlanıyor...')">⬇️ STL (Baskı)</button>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        const token = localStorage.getItem('pf_token');
        let currentTaskId = null;

        if(!token) window.location.href = '/';

        function switchTab(type) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('textPanel').style.display = type === 'text' ? 'block' : 'none';
            document.getElementById('imagePanel').style.display = type === 'image' ? 'block' : 'none';
        }

        function previewFile() {
            const file = document.getElementById('fileInp').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imgPreview').src = e.target.result;
                    document.getElementById('imgPreview').style.display = 'block';
                    document.getElementById('uploadPlaceholder').style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        }

        async function generate(type) {
            const st = document.getElementById('status');
            const btn = type === 'text' ? document.getElementById('genTextBtn') : document.getElementById('genImgBtn');
            
            st.style.display = 'block';
            st.textContent = "🚀 AI Modeli örüyor, bu işlem 1-3 dakika sürebilir...";
            btn.disabled = true;

            try {
                let r;
                if(type === 'text') {
                    r = await fetch(API+'/api/generate/text', {
                        method:'POST',
                        headers:{'Content-Type':'application/json', 'Authorization': 'Bearer '+token},
                        body: JSON.stringify({prompt: document.getElementById('prompt').value})
                    });
                } else {
                    const formData = new FormData();
                    formData.append('file', document.getElementById('fileInp').files[0]);
                    r = await fetch(API+'/api/generate/image', {
                        method:'POST',
                        headers:{'Authorization': 'Bearer '+token},
                        body: formData
                    });
                }

                const d = await r.json();
                currentTaskId = d.task_id;
                startPolling(d.task_id, btn);

            } catch (err) {
                st.textContent = "❌ Bir hata oluştu.";
                btn.disabled = false;
            }
        }

        function startPolling(taskId, btn) {
            const st = document.getElementById('status');
            let poll = setInterval(async () => {
                const res = await fetch(API+'/api/status/'+taskId);
                const data = await res.json();
                
                if(data.status === 'done') {
                    clearInterval(poll);
                    st.textContent = "✅ Üretim Tamamlandı!";
                    showModel(taskId);
                    btn.disabled = false;
                } else if(data.status === 'failed') {
                    clearInterval(poll);
                    st.textContent = "❌ Üretim başarısız oldu.";
                    btn.disabled = false;
                }
            }, 5000);
        }

        function showModel(taskId) {
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('downloadBox').style.display = 'grid';
            const viewer = document.getElementById('modelViewer');
            viewer.src = `${API}/api/model/${taskId}/view`;
        }

        function downloadModel(fmt) {
            window.open(`${API}/api/model/${currentTaskId}/glb`, '_blank');
        }
    </script>
</body>
</html>
