<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrintForge - AI 3D Model Uretici</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root {
      --bg: #0a0a1a;
      --bg2: #0f0f24;
      --border: rgba(108, 92, 231, 0.2);
      --primary: #6c5ce7;
      --primary2: #a29bfe;
      --text: #e8e6f0;
      --text2: #a0a0c0;
      --ok: #00b894;
      --err: #ff6b6b;
      --grad: linear-gradient(135deg, #6c5ce7, #00cec9);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .layout { display: grid; grid-template-columns: 320px 1fr; min-height: 100vh; }
    .panel { background: var(--bg2); border-right: 1px solid var(--border); padding: 24px; }
    .brand { font-family: "Space Grotesk", sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 20px; }
    .muted { color: var(--text2); font-size: 13px; line-height: 1.7; }
    .group { margin-top: 18px; }
    label { display: block; margin-bottom: 6px; font-size: 11px; color: var(--text2); font-weight: 600; }
    input, textarea {
      width: 100%;
      background: rgba(15, 15, 36, 0.8);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-size: 13px;
    }
    textarea { min-height: 120px; resize: vertical; }
    .row { display: flex; gap: 10px; }
    button {
      border: 0;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      padding: 12px 14px;
      font-size: 13px;
    }
    .btn-primary { background: var(--grad); color: #fff; width: 100%; margin-top: 12px; }
    .btn-secondary { background: transparent; color: var(--primary2); border: 1px solid var(--border); }
    .content { display: flex; flex-direction: column; min-width: 0; }
    .top {
      height: 70px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
    }
    .viewer-wrap { flex: 1; position: relative; min-height: 420px; }
    model-viewer { width: 100%; height: 100%; background: #0b0b1a; }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text2);
      font-size: 13px;
      pointer-events: none;
    }
    .toolbar {
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      padding: 12px 14px;
      flex-wrap: wrap;
    }
    .pill { background: rgba(108, 92, 231, 0.12); color: var(--primary2); border: 1px solid var(--border); border-radius: 999px; padding: 4px 10px; font-size: 11px; }
    .toast {
      position: fixed;
      top: 18px;
      right: 18px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(10, 10, 26, 0.95);
      font-size: 12px;
      z-index: 99;
      display: none;
    }
    .toast.ok { color: var(--ok); border-color: rgba(0, 184, 148, 0.35); }
    .toast.err { color: var(--err); border-color: rgba(255, 107, 107, 0.35); }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .panel { border-right: 0; border-bottom: 1px solid var(--border); }
      .viewer-wrap { min-height: 300px; }
    }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>
  <div class="layout">
    <aside class="panel">
      <div class="brand">PRINTFORGE</div>
      <p class="muted">Bu final dosya, paylastigin kodun duzeltilmis ve sade hale getirilmis surumudur.</p>

      <div class="group">
        <label for="prompt">PROMPT</label>
        <textarea id="prompt" placeholder="Ornek: A futuristic helmet with clean edges"></textarea>
      </div>

      <div class="group row">
        <button class="btn-secondary" onclick="setStyle('realistic')">Gercekci</button>
        <button class="btn-secondary" onclick="setStyle('lowpoly')">Low Poly</button>
      </div>

      <button class="btn-primary" id="generateBtn" onclick="generateText()">Model Uret</button>

      <div class="group">
        <label for="plan">PLAN</label>
        <div class="row">
          <button class="btn-secondary" onclick="upgradePlan('pro')">Pro</button>
          <button class="btn-secondary" onclick="upgradePlan('business')">Business</button>
        </div>
      </div>
    </aside>

    <section class="content">
      <div class="top">
        <strong>3D Goruntuleyici</strong>
        <span class="pill" id="taskInfo">Task: -</span>
      </div>
      <div class="viewer-wrap" id="viewerWrap">
        <div class="overlay" id="emptyState">Model henuz yok. Sol panelden bir uretim baslat.</div>
      </div>
      <div class="toolbar">
        <button class="btn-secondary" onclick="toggleRotate()">Auto Rotate</button>
        <button class="btn-secondary" onclick="downloadModel('glb')">GLB Indir</button>
        <button class="btn-secondary" onclick="downloadModel('stl')">STL Indir</button>
      </div>
    </section>
  </div>

  <script>
    const API = window.location.origin;
    let currentToken = localStorage.getItem("pf_token") || "";
    let currentStyle = "realistic";
    let currentTaskId = "";
    let poller = null;

    function toast(msg, type) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.className = "toast " + (type || "ok");
      el.style.display = "block";
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => {
        el.style.display = "none";
      }, 3200);
    }

    function setStyle(style) {
      currentStyle = style;
      toast("Stil secildi: " + style, "ok");
    }

    function safeLogout() {
      localStorage.removeItem("pf_token");
      localStorage.removeItem("pf_user");
      currentToken = "";
      toast("Oturum gecersiz. Tekrar giris yapin.", "err");
    }

    function checkSession() {
      if (!currentToken || currentToken === "no-jwt") return;

      fetch(API + "/api/auth/me", {
        headers: { Authorization: "Bearer " + currentToken },
      })
        .then((res) => {
          if (!res.ok) throw new Error("Invalid token");
          return res.json();
        })
        .catch(() => {
          // Fix: gecersiz token varsa sahte fallback yok, direkt temizle.
          safeLogout();
        });
    }

    function generateText() {
      const prompt = document.getElementById("prompt").value.trim();
      if (!prompt) {
        toast("Prompt girin", "err");
        return;
      }
      const btn = document.getElementById("generateBtn");
      btn.disabled = true;
      btn.textContent = "Uretiliyor...";

      fetch(API + "/api/generate/text", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + currentToken,
        },
        body: JSON.stringify({ prompt, style: currentStyle }),
      })
        .then((res) => res.json().then((data) => ({ ok: res.ok, data })))
        .then(({ ok, data }) => {
          if (!ok) throw new Error(data.detail || "Uretim basarisiz");
          currentTaskId = data.task_id;
          document.getElementById("taskInfo").textContent = "Task: " + currentTaskId;
          pollStatus();
          toast("Uretim baslatildi", "ok");
        })
        .catch((err) => toast(err.message, "err"))
        .finally(() => {
          btn.disabled = false;
          btn.textContent = "Model Uret";
        });
    }

    function pollStatus() {
      clearInterval(poller);
      poller = setInterval(() => {
        fetch(API + "/api/status/" + currentTaskId)
          .then((res) => res.json())
          .then((data) => {
            if (data.status === "done") {
              clearInterval(poller);
              showModel(currentTaskId, data.model_url || "");
            }
            if (data.status === "failed") {
              clearInterval(poller);
              toast("Uretim basarisiz", "err");
            }
          })
          .catch(() => {
            clearInterval(poller);
            toast("Durum sorgulanamadi", "err");
          });
      }, 2000);
    }

    function showModel(taskId, directUrl) {
      const wrap = document.getElementById("viewerWrap");
      const empty = document.getElementById("emptyState");
      empty.style.display = "none";
      const old = wrap.querySelector("model-viewer");
      if (old) old.remove();

      const mv = document.createElement("model-viewer");
      mv.setAttribute("camera-controls", "");
      mv.setAttribute("auto-rotate", "");
      mv.setAttribute("rotation-per-second", "30deg");
      mv.setAttribute("environment-image", "neutral");

      // once direct model_url, sonra proxy
      const proxyUrl = API + "/api/model/" + taskId + "/view";
      mv.src = directUrl || proxyUrl;
      mv.addEventListener("error", () => {
        if (mv.src !== proxyUrl) mv.src = proxyUrl;
      });

      wrap.appendChild(mv);
    }

    function toggleRotate() {
      const mv = document.querySelector("model-viewer");
      if (!mv) return;
      if (mv.hasAttribute("auto-rotate")) mv.removeAttribute("auto-rotate");
      else mv.setAttribute("auto-rotate", "");
    }

    function downloadModel(format) {
      if (!currentTaskId) {
        toast("Indirilecek model yok", "err");
        return;
      }
      window.open(API + "/api/model/" + currentTaskId + "/" + format, "_blank");
    }

    function upgradePlan(plan) {
      // Fix: backend'e secilen plan net olarak gonderiliyor.
      fetch(API + "/api/payment/upgrade", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + currentToken,
        },
        body: JSON.stringify({ plan }),
      })
        .then((res) => res.json().then((data) => ({ ok: res.ok, data })))
        .then(({ ok, data }) => {
          if (!ok || !data.success) throw new Error(data.detail || "Plan guncellenemedi");
          toast("Plan guncellendi: " + (data.plan || plan), "ok");
        })
        .catch((err) => toast(err.message, "err"));
    }

    checkSession();
  </script>
</body>
</html>
